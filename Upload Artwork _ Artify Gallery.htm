<!DOCTYPE html>
<html lang="en"><head>
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
  <meta charset="UTF-8">
  <title>Upload Artwork | Artify Gallery</title>

  <style>
    body {
      margin: 0;
      font-family: "Poppins", sans-serif;
      background: #fff7c2;
    }

    /* Header */
    .main-title {
      text-align: center;
      background: linear-gradient(to right, #ff8c00, #ffa733);
      color: white;
      padding: 25px 0;
      font-size: 45px;
      margin: 0;
      letter-spacing: 2px;
      font-weight: 700;
    }

    header {
      text-align: center;
      padding: 20px;
    }

    header h1 {
      margin-bottom: 10px;
      color: #333;
    }

    nav a {
      margin: 0 15px;
      text-decoration: none;
      color: #ff6a00;
      font-weight: bold;
      font-size: 18px;
    }

    nav a:hover {
      color: #d35400;
    }

    /* Form Section */
    .form-section {
      width: 50%;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    label {
      font-size: 18px;
      font-weight: 600;
      color: #444;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 20px;
      border: 2px solid #ffb84d;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #ff8c00;
      box-shadow: 0 0 5px #ffb84d;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #ff8c00;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #e67300;
    }

    .hint {
      text-align: center;
      margin-top: 15px;
      color: #666;
      font-style: italic;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #ffcc66;
      margin-top: 40px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1 class="main-title">Artify Gallery</h1>

  <header>
    <h1>Upload Your Artwork</h1>
    <nav>
      <a href="file:///C:/Users/USER/OneDrive/Documents/index.html">Home</a>
      <a href="file:///C:/Users/USER/OneDrive/Documents/upload.html">Upload</a>
      <a href="file:///C:/Users/USER/OneDrive/Documents/gallery.html">Gallery</a>
    </nav>
  </header>

  <!-- Upload Form -->
  <section class="form-section">
    <form id="artForm">
      <label>Artwork Name:</label>
      <input type="text" id="artName" placeholder="Enter artwork name" required="">

      <label>Category:</label>
      <input type="text" id="artCategory" placeholder="e.g., Landscape, Portrait" required="">

      <label>Description:</label>
      <textarea id="artDesc" placeholder="Short description" required=""></textarea>

      <button type="submit">Upload Artwork</button>
    </form>

    <p class="hint">💡 Hint: You can add JavaScript to store form data in localStorage later.</p>
  </section>

  <footer>© 2025 Artify Gallery | Upload Page</footer>


</body></html>
